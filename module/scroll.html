<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정주행 뷰어 프로토타입</title>
<style>
  /* 기본 리셋 및 모바일 화면처럼 보이게 래핑 */
  body { font-family: 'Malgun Gothic', sans-serif; background: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
  .phone-wrapper { width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; height: 700px; position: relative; }
  
  /* 일반 기사 화면 스타일 */
  .header { background: #1a1a1a; color: white; padding: 15px; text-align: center; font-weight: bold; }
  .content { padding: 20px; }
  .article-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
  .article-date { color: #888; font-size: 13px; margin-bottom: 20px; }
  .btn-binge { display: block; width: 100%; background: #e50914; color: white; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 6px rgba(229, 9, 20, 0.3); }
  .btn-binge:active { background: #b20710; }

  /* 정주행(피드) 뷰어 화면 스타일 - 넷플릭스 느낌의 다크모드 */
  #binge-viewer { display: none; background: #121212; color: #fff; height: 100%; overflow-y: auto; position: absolute; top: 0; left: 0; width: 100%; }
  .binge-header { position: sticky; top: 0; background: rgba(18, 18, 18, 0.95); padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 10; font-weight: bold; }
  .close-btn { cursor: pointer; color: #aaa; font-size: 14px; }
  
  /* 피드 카드 스타일 */
  .card { background: #222; margin: 15px; padding: 20px; border-radius: 10px; border-left: 4px solid #e50914; }
  .card-date { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .card-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
  .card-summary { font-size: 15px; line-height: 1.6; color: #ccc; }
  
  /* 로딩 UI */
  .loader { text-align: center; padding: 20px; color: #888; display: none; font-size: 14px; }
</style>
</head>
<body>

  <div class="phone-wrapper">
    <div id="normal-view">
      <div class="header">뉴스포털(가칭)</div>
      <div class="content">
        <div class="article-title">[단독] 글로벌 경제 위기, 진짜 원인은 이것</div>
        <div class="article-date">2026.03.27</div>
        <p style="line-height: 1.6; color: #333;">오늘 시장이 크게 요동쳤습니다. 전문가들은 이번 사태가 단기적인 현상이 아니라 과거부터 이어져 온 복잡한 정책 흐름의 결과라고 분석합니다. 전체 맥락을 이해하는 것이 그 어느 때보다 중요해졌습니다...</p>
        
        <button class="btn-binge" onclick="startBinge()">📺 이 이슈, 처음부터 정주행하기</button>
      </div>
    </div>

    <div id="binge-viewer">
      <div class="binge-header">
        <span>#글로벌_경제_위기</span>
        <span class="close-btn" onclick="closeBinge()">✖ 나가기</span>
      </div>
      
      <div id="feed-container">
        </div>
      
      <div class="loader" id="loader">다음 흐름 불러오는 중...</div>
    </div>
  </div>

  <script>
    const normalView = document.getElementById('normal-view');
    const bingeViewer = document.getElementById('binge-viewer');
    const feedContainer = document.getElementById('feed-container');
    const loader = document.getElementById('loader');

    let episodeCount = 1;
    let isFetching = false;

    // 뷰어 열기
    function startBinge() {
      normalView.style.display = 'none';
      bingeViewer.style.display = 'block';
      feedContainer.innerHTML = ''; 
      episodeCount = 1;
      
      // 처음 뷰어를 열 때 2개의 기사를 미리 로드해 둡니다.
      loadNextArticle();
      setTimeout(loadNextArticle, 300);
    }

    // 뷰어 닫기
    function closeBinge() {
      bingeViewer.style.display = 'none';
      normalView.style.display = 'block';
    }

    // 가상의 백엔드 API에서 다음 기사 데이터를 가져온다고 가정
    function loadNextArticle() {
      if (isFetching) return;
      isFetching = true;
      loader.style.display = 'block';

      // 서버 통신(ex: fetch) 딜레이를 setTimeout으로 흉내 냄
      setTimeout(() => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-date">에피소드 ${episodeCount}</div>
          <div class="card-title">이슈 타임라인 핵심 요약 ${episodeCount}화</div>
          <div class="card-summary">
            이전 기사를 다 읽고 스크롤을 내리면, 독자가 따로 클릭하지 않아도 DB에서 다음 기사 데이터를 물고 와서 자동으로 아래에 붙여줍니다. 끊김 없는 소비가 일어납니다.
          </div>
        `;
        feedContainer.appendChild(card);
        episodeCount++;
        
        loader.style.display = 'none';
        isFetching = false;
      }, 800); // 0.8초 딜레이
    }

    // 스크롤 이벤트 리스너 (무한 스크롤 구현)
    bingeViewer.addEventListener('scroll', () => {
      // 스크롤이 맨 밑에 거의 다다랐을 때 다음 기사 호출
      if (bingeViewer.scrollTop + bingeViewer.clientHeight >= bingeViewer.scrollHeight - 20) {
        loadNextArticle();
      }
    });
  </script>

</body>
</html>
